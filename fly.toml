app = 'data-ruler-web'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.web'
  [build.args]
    BUILD_VERSION = 'fly-deploy'

[env]
  DATABASE_PATH = '/data/databases'
  UPLOAD_PATH = '/data/uploads'
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

[mounts]
  source = 'data_ruler_data'
  destination = '/data'
