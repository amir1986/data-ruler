app = "data-ruler-web"
primary_region = "iad"

[build]
  dockerfile = "apps/web/Dockerfile"
  build_target = "runner"

[env]
  NODE_ENV = "production"
  DATABASE_PATH = "/data/databases"
  UPLOAD_PATH = "/data/uploads"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "data_ruler_data"
  destination = "/data"
