version: '3.8'

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: "${BUILD_VERSION:-dev}"
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-super-secret-key-change-in-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - AI_SERVICE_URL=http://ai-service:8000
      - DATABASE_PATH=/data/databases
      - UPLOAD_PATH=/data/uploads
    volumes:
      - app-data:/data
    depends_on:
      - ai-service
    restart: unless-stopped

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Cloud LLM keys — Groq + Ollama Cloud (pass from host .env)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_CLOUD_API_KEY=${OLLAMA_CLOUD_API_KEY:-}
      # Model overrides
      - GROQ_CHAT_MODEL=${GROQ_CHAT_MODEL:-llama-3.3-70b-versatile}
      - GROQ_CODE_MODEL=${GROQ_CODE_MODEL:-llama-3.3-70b-versatile}
      - GROQ_FAST_MODEL=${GROQ_FAST_MODEL:-llama-3.1-8b-instant}
      - OLLAMA_CLOUD_BASE_URL=${OLLAMA_CLOUD_BASE_URL:-https://ollama.com/v1}
      # Storage
      - DATABASE_PATH=/data/databases
      - UPLOAD_PATH=/data/uploads
      - VECTOR_PATH=/data/vectors
      - THUMBNAIL_PATH=/data/thumbnails
      - EXPORT_PATH=/data/exports
      - LLM_TIMEOUT=120
    volumes:
      - app-data:/data
    restart: unless-stopped

volumes:
  app-data:
